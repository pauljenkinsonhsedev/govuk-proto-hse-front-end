{% extends "layouts/hse.html" %}

{% block pageTitle %}
  What is being developed on the site? – {{ serviceName }} – HSE
{% endblock %}

{% block content %}

  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">

      <form action="/check-details" method="post" novalidate>

        <div class="govuk-form-group">
          <h1 class="govuk-label-wrapper">
            <label class="hse-label hse-label--l hse-u-margin-bottom-3" for="building-type">
              What is being developed on the site?
            </label>
          </h1>
          <select class="govuk-select" id="building-type" name="buildingType" data-module="autocomplete">
            {% include "includes/lists/building-type.html" %}
          </select>
        </div>

        <button class="hse-button">
          Continue
        </button>

      </form>

      <p class="hse-body">
        <a href="#" class="hse-link">The building type is not listed</a>
      </p>

    </div>
  </div>

{% endblock %}
